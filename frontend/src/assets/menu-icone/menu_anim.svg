<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img">
  <title>Icône boussole — animée</title>
  <desc>Aiguille qui tourne à l'intérieur du cadran fixe, comme une vraie boussole</desc>

  <defs>
    <style>
      @keyframes spin {
        0%   { transform: rotate(0deg);   }
        40%  { transform: rotate(210deg); }
        65%  { transform: rotate(335deg); }
        78%  { transform: rotate(350deg); }
        86%  { transform: rotate(344deg); }
        92%  { transform: rotate(348deg); }
        96%  { transform: rotate(346deg); }
        100% { transform: rotate(360deg); }
      }
      .needle {
        transform-origin: 40px 40px;
        animation: spin 4s cubic-bezier(0.33, 1, 0.68, 1) infinite;
      }
      @media (prefers-reduced-motion: reduce) {
        .needle { animation: none; }
      }
    </style>
    <clipPath id="dial-clip">
      <circle cx="40" cy="40" r="33"/>
    </clipPath>
  </defs>

  <!-- Cadran fixe -->
  <circle cx="40" cy="40" r="36" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="40" y1="5"  x2="40" y2="11" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="69" x2="40" y2="75" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5"  y1="40" x2="11" y2="40" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="69" y1="40" x2="75" y2="40" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14.5" y1="14.5" x2="18.5" y2="18.5" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <line x1="61.5" y1="14.5" x2="57.5" y2="18.5" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <line x1="14.5" y1="65.5" x2="18.5" y2="61.5" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <line x1="65.5" y1="65.5" x2="61.5" y2="61.5" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <circle cx="40" cy="40" r="26" fill="none" stroke="#1a1a1a" stroke-width="0.6" opacity="0.25"/>
  <text x="40" y="9"  text-anchor="middle" dominant-baseline="middle" font-family="Georgia, serif" font-size="8" font-weight="700" fill="#1a1a1a">N</text>
  <text x="40" y="74" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, serif" font-size="7" font-weight="400" fill="#1a1a1a" opacity="0.55">S</text>
  <text x="74" y="41" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, serif" font-size="7" font-weight="400" fill="#1a1a1a" opacity="0.55">E</text>
  <text x="6"  y="41" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, serif" font-size="7" font-weight="400" fill="#1a1a1a" opacity="0.55">O</text>

  <!-- Aiguille animée, clippée strictement dans le cadran -->
  <g class="needle" clip-path="url(#dial-clip)">
    <polygon points="40,17 43.5,39 40,35 36.5,39" fill="#1a1a1a"/>
    <polygon points="40,63 43.5,41 40,45 36.5,41" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <!-- Pivot central fixe -->
  <circle cx="40" cy="40" r="4.5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="40" cy="40" r="1.8" fill="#1a1a1a"/>
</svg>
